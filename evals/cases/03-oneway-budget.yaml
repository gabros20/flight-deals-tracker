id: 03-oneway-budget
utterance: "Find cheap one-way European island flights from Budapest in August under €120"
expected_command: >-
  flight-deals oneway --depart 2026-08 --where island --budget 120 --from BUD
notes: >-
  The user explicitly says "one-way", so this is `oneway`, not `getaway`. That
  word is the discriminative signal: on a leisure ask with the return/duration
  UNSTATED the router prefers `getaway --nights 3-7` (or asks) — `oneway` is
  only correct when the user actually says one-way / single leg, as here.
  "European island" maps to the tag `island` (a bare tag is a valid --where
  expression); do not invent a compound tag like "european-island" that
  doesn't exist in the taxonomy (the old v1 alias "european-islands" happens to
  expand to `island`, but the router doesn't need the alias — the bare tag is
  enough). `--from BUD` may be omitted if BUD is already the configured default.
source: "made up for coverage (explicit one-way + budget routing)"
